<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fridzone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <header>
    <div class="header-bg-glow"></div>
    <h1 class="glow-text">fridzone</h1>
</header>

                        <div class="playlist-info">
                            <span class="playlist-number">01</span>
                            <h3 class="playlist-title">Mix</h3>
                            <p class="playlist-sub">view playlist</p>
                        </div>
                    </a>

                    <a href="#" target="_blank" class="playlist-card glow-card">
                        <img src="https://image-cdn-ak.spotifycdn.com/image/ab67706c0000d72cf14c97d0197972e60a39c1f3" alt="Cover" class="playlist-cover">

                        </div>
                    </a>

                    <a href="#" target="_blank" class="playlist-card glow-card">
                        <img src="https://image-cdn-ak.spotifycdn.com/image/ab67706c0000d72c35ee9db01099c914abeba106" alt="Cover" class="playlist-cover">
                        <div class="playlist-info">
                            <span class="playlist-number">03</span>
                            <h3 class="playlist-title">Vibes</h3>
                            <p class="playlist-sub">view playlist</p>
                        </div>
                    </a>

                    <a href="#" target="_blank" class="playlist-card glow-card">
                        <img src="https://image-cdn-ak.spotifycdn.com/image/ab67706c0000d72c5a7ad84012007ffbec6cb0c5" alt="Cover" class="playlist-cover">
                        <div class="playlist-info">
                            <span class="playlist-number">04</span>
                            <h3 class="playlist-title">Best X EDM</h3>
                            <p class="playlist-sub">view playlist</p>
                        </div>
                    </a>

                    <a href="#" target="_blank" class="playlist-card glow-card">
                        <img src="https://image-cdn-ak.spotifycdn.com/image/ab67706c0000d72cda4b1ac5d5f1783961a7f7de" alt="Cover" class="playlist-cover">
                        <div class="playlist-info">
                            <span class="playlist-number">05</span>
                            <h3 class="playlist-title">Frank Ocean</h3>
                            <p class="playlist-sub">view playlist</p>
                        </div>
                    </a>
                     
                    <a href="#" target="_blank" class="playlist-card glow-card">
                        <img src="https://image-cdn-ak.spotifycdn.com/image/ab67706c0000d72c32d0383d4fc6656de0c747b2" alt="Cover" class="playlist-cover">
                        <div class="playlist-info">
                            <span class="playlist-number">06</span>
                            <h3 class="playlist-title">Tame Impala</h3>
                            <p class="playlist-sub">view playlist</p>
                        </div>
                    </a>

                </div>
            </section>

            <section class="section-column">
                <div class="discord-card glow-card">
                    <div class="discord-header">
                        <div class="avatar-wrapper">
                            <img id="discord-avatar" src="https://via.placeholder.com/150" alt="Avatar">
                            <div id="status-dot"></div>
                        </div>
                        <h2 id="discord-name">loading...</h2>
                        <p id="discord-tag">@username</p>
                    </div>
                    <div class="activity-section">
                        <p class="label">Current Activity</p>
                        <div id="discord-activity">Chilling...</div>
                </div>
            </section>

        </main>

        <footer>
            <p>© 2026 fridzone.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
